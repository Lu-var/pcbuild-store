$kind: http-request
description: |-
  Updates an existing user's name and phone. Email is not included (not updatable).

  **Expected:** 200 OK
url: "{{user_service}}/api/users/1"
method: PUT
body:
  type: json
  content: |-
    {
      "name": "Lucas Updated",
      "lastName": "Vargas",
      "phone": "+56999999999"
    }
order: 10000
