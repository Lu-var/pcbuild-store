$kind: http-request
name: Get User by Phone - Not Found
description: |-
  Fetch a user by phone number that does not exist.
  Expected: 404 Not Found.
method: GET
url: '{{baseUrl}}/api/users/phone/:phone'
order: 4100
pathVariables:
  - key: phone
    value: '00000000'
testScript: |-
  pm.test('Status code is 404', function () {
    pm.response.to.have.status(404);
  });
