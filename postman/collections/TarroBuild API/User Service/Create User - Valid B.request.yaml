$kind: http-request
name: Create User - Valid B
description: |-
  Create a second user with a different email.
  Expected: 201 Created with UserResponse.
method: POST
url: '{{baseUrl}}/api/users'
order: 5200
preRequestScript: |-
  const timestamp = Date.now();
  const email = `postman.userb+${timestamp}@example.com`;
  const phone = String(timestamp).slice(-8);
  pm.environment.set('userEmailB', email);
  pm.environment.set('userPhoneB', phone);
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Alex",
      "lastName": "Smith",
      "email": "{{userEmailB}}",
      "phone": "{{userPhoneB}}"
    }
testScript: |-
  pm.test('Status code is 201', function () {
    pm.response.to.have.status(201);
  });

  pm.test('Response has user fields', function () {
    const json = pm.response.json();
    pm.expect(json).to.have.property('id');
    pm.expect(json).to.have.property('name', 'Alex');
    pm.expect(json).to.have.property('lastName', 'Smith');
    pm.expect(json).to.have.property('email', pm.environment.get('userEmailB'));
    pm.expect(json).to.have.property('phone', pm.environment.get('userPhoneB'));
    pm.expect(json).to.have.property('createdAt');
  });
