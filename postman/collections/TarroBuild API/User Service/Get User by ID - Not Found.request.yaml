$kind: http-request
name: Get User by ID - Not Found
description: |-
  Fetch a user by id that does not exist.
  Expected: 404 Not Found.
method: GET
url: '{{baseUrl}}/api/users/:id'
order: 2100
pathVariables:
  - key: id
    value: '9999'
testScript: |-
  pm.test('Status code is 404', function () {
    pm.response.to.have.status(404);
  });
