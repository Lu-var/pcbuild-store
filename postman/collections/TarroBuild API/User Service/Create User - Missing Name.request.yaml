$kind: http-request
name: Create User - Missing Name
description: |-
  Attempt to create a user with an empty name.
  Expected: 400 Bad Request with ApiError.
method: POST
url: '{{baseUrl}}/api/users'
order: 5600
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "",
      "lastName": "NoName",
      "email": "noname@example.com",
      "phone": "66666666"
    }
testScript: |-
  pm.test('Status code is 400', function () {
    pm.response.to.have.status(400);
  });

  pm.test('ApiError has message and timestamp', function () {
    const json = pm.response.json();
    pm.expect(json).to.have.property('message');
    pm.expect(json).to.have.property('timestamp');
  });
