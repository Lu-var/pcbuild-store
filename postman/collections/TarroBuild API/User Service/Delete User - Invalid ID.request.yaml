$kind: http-request
name: Delete User - Invalid ID
description: |-
  Attempt to delete a user using a non-numeric id.
  Expected: 400 Bad Request.
method: DELETE
url: '{{baseUrl}}/api/users/:id'
order: 7300
pathVariables:
  - key: id
    value: abc
testScript: |-
  pm.test('Status code is 400', function () {
    pm.response.to.have.status(400);
  });
