$kind: http-request
name: Update User - Invalid ID
description: |-
  Attempt to update a user using a non-numeric id.
  Expected: 400 Bad Request.
method: PUT
url: '{{baseUrl}}/api/users/:id'
order: 6400
pathVariables:
  - key: id
    value: abc
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Bad",
      "lastName": "Id",
      "phone": "77777777"
    }
testScript: |-
  pm.test('Status code is 400', function () {
    pm.response.to.have.status(400);
  });
