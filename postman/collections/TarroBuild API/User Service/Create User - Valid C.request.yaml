$kind: http-request
name: Create User - Valid C
description: |-
  Create a third user with a different email.
  Expected: 201 Created with UserResponse.
method: POST
url: '{{baseUrl}}/api/users'
order: 5300
preRequestScript: |-
  const timestamp = Date.now();
  const email = `postman.userc+${timestamp}@example.com`;
  const phone = String(timestamp).slice(-8);
  pm.environment.set('userEmailC', email);
  pm.environment.set('userPhoneC', phone);
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Casey",
      "lastName": "Lee",
      "email": "{{userEmailC}}",
      "phone": "{{userPhoneC}}"
    }
testScript: |-
  pm.test('Status code is 201', function () {
    pm.response.to.have.status(201);
  });

  pm.test('Response has user fields', function () {
    const json = pm.response.json();
    pm.expect(json).to.have.property('id');
    pm.expect(json).to.have.property('name', 'Casey');
    pm.expect(json).to.have.property('lastName', 'Lee');
    pm.expect(json).to.have.property('email', pm.environment.get('userEmailC'));
    pm.expect(json).to.have.property('phone', pm.environment.get('userPhoneC'));
    pm.expect(json).to.have.property('createdAt');
  });
