$kind: http-request
name: Update User - Valid
description: |-
  Update an existing user.
  Expected: 200 OK with UserResponse.
  Note: Replace id with an existing user id.
method: PUT
url: '{{baseUrl}}/api/users/:id'
order: 6100
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated",
      "lastName": "User",
      "phone": "99999999"
    }
testScript: |-
  pm.test('Status code is 200', function () {
    pm.response.to.have.status(200);
  });

  pm.test('Response reflects updates', function () {
    const json = pm.response.json();
    pm.expect(json).to.have.property('name', 'Updated');
    pm.expect(json).to.have.property('lastName', 'User');
    pm.expect(json).to.have.property('phone', '99999999');
  });
