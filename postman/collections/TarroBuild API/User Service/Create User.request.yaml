$kind: http-request
name: Create User
description: |-
  Create a new user.
  Expected: 201 Created with UserResponse.
  Validation errors or duplicate email return 400 with ApiError.
method: POST
url: '{{baseUrl}}/api/users'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John",
      "lastName": "Doe",
      "email": "john.doe@example.com",
      "phone": "123456789"
    }
testScript: |-
  pm.test('Status code is 201', function () {
    pm.response.to.have.status(201);
  });

  pm.test('Response has user fields', function () {
    const json = pm.response.json();
    pm.expect(json).to.have.property('id');
    pm.expect(json).to.have.property('name');
    pm.expect(json).to.have.property('lastName');
    pm.expect(json).to.have.property('email');
    pm.expect(json).to.have.property('phone');
    pm.expect(json).to.have.property('createdAt');
  });
